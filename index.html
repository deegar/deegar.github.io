<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="3;url=https://facesmsmart.com/S2BiRFXJVS">
  <title>Finding Your Perfect Match</title>
  <style>
    :root {
      --bg-start: #fff8fb;
      --bg-mid: #ffe4ee;
      --bg-end: #ffd3e2;
      --card-bg: rgba(255, 255, 255, 0.72);
      --card-border: rgba(255, 201, 220, 0.5);
      --text-main: #a33b66;
      --text-sub: rgba(163, 59, 102, 0.72);
      --accent: #ff9fbd;
      --accent-strong: #ff7ea8;
      --button-bg: rgba(255, 255, 255, 0.8);
      --button-border: rgba(255, 177, 203, 0.6);
      --shadow: 0 26px 60px rgba(255, 143, 176, 0.26);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding:
        max(16px, env(safe-area-inset-top))
        max(16px, env(safe-area-inset-right))
        max(16px, env(safe-area-inset-bottom))
        max(16px, env(safe-area-inset-left));
      overflow-x: hidden;
      overflow-y: auto;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.96), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255, 192, 203, 0.28), transparent 34%),
        linear-gradient(135deg, var(--bg-start), var(--bg-mid) 52%, var(--bg-end));
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      filter: blur(8px);
      opacity: 0.55;
      animation: float 9s ease-in-out infinite;
      z-index: 0;
    }

    body::before {
      width: 280px;
      height: 280px;
      top: -80px;
      right: -40px;
      background: rgba(255, 255, 255, 0.78);
    }

    body::after {
      width: 360px;
      height: 360px;
      bottom: -140px;
      left: -90px;
      background: rgba(255, 190, 214, 0.34);
      animation-delay: -4s;
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(100%, 520px);
      padding: 36px 28px;
      border: 1px solid var(--card-border);
      border-radius: 28px;
      background: var(--card-bg);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      text-align: center;
      animation: card-enter 0.8s ease-out;
      overflow: hidden;
    }

    .card::before {
      content: "♥";
      position: absolute;
      top: 18px;
      right: 20px;
      font-size: 22px;
      color: rgba(255, 126, 168, 0.8);
      text-shadow: 0 0 18px rgba(255, 159, 189, 0.32);
    }

    .card::after {
      content: "";
      position: absolute;
      inset: auto -60px -70px auto;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 214, 230, 0.85), rgba(255, 214, 230, 0));
      pointer-events: none;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 238, 245, 0.95);
      color: #d75b88;
      font-size: 14px;
      letter-spacing: 0.16em;
      box-shadow: 0 10px 24px rgba(255, 170, 198, 0.18);
    }

    h1 {
      margin: 22px 0 12px;
      font-size: clamp(30px, 5vw, 44px);
      line-height: 1.1;
      font-weight: 700;
      color: #c84f7d;
    }

    p {
      margin: 0 auto;
      max-width: 30ch;
      color: var(--text-sub);
      font-size: 16px;
      line-height: 1.7;
    }

    .countdown-ring {
      width: 140px;
      height: 140px;
      margin: 30px auto 18px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, rgba(255, 255, 255, 0.88) 0 56%, transparent 57% 100%),
        conic-gradient(var(--accent) calc(var(--progress) * 1%), rgba(255, 214, 230, 0.5) 0);
      box-shadow: inset 0 0 24px rgba(255, 255, 255, 0.28), 0 14px 30px rgba(255, 159, 189, 0.16);
    }

    .countdown-inner {
      width: 104px;
      height: 104px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 239, 245, 0.92));
      border: 1px solid rgba(255, 194, 216, 0.48);
    }

    .count {
      font-size: 44px;
      font-weight: 800;
      line-height: 1;
      color: #c84f7d;
    }

    .count-label {
      margin-top: 6px;
      font-size: 13px;
      color: rgba(200, 79, 125, 0.72);
      letter-spacing: 0.12em;
    }

    .match-line {
      margin-top: 14px;
      font-size: 15px;
      color: rgba(180, 76, 114, 0.92);
      font-weight: 600;
    }

    .target {
      margin-top: 18px;
      font-size: 14px;
      color: rgba(163, 59, 102, 0.72);
      word-break: break-all;
      line-height: 1.6;
    }

    .target strong {
      display: inline-block;
      margin-top: 4px;
      color: var(--text-main);
    }

    .actions {
      margin-top: 26px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 148px;
      padding: 12px 18px;
      border-radius: 999px;
      border: 1px solid var(--button-border);
      background: var(--button-bg);
      color: var(--text-main);
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
      box-shadow: 0 10px 24px rgba(255, 170, 198, 0.12);
    }

    .button:hover {
      transform: translateY(-1px);
      background: rgba(255, 247, 250, 0.98);
      border-color: rgba(255, 146, 184, 0.56);
    }

    .button.primary {
      color: #ffffff;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      border-color: transparent;
    }

    .button.primary:hover {
      background: linear-gradient(135deg, #ffaac5, #ff719d);
    }

    .floating-hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .floating-hearts span {
      position: absolute;
      color: rgba(255, 126, 168, 0.42);
      font-size: 24px;
      animation: heart-float 8s ease-in-out infinite;
    }

    .floating-hearts span:nth-child(1) {
      top: 16%;
      left: 14%;
      font-size: 22px;
    }

    .floating-hearts span:nth-child(2) {
      top: 26%;
      right: 16%;
      font-size: 28px;
      animation-delay: -2s;
    }

    .floating-hearts span:nth-child(3) {
      bottom: 20%;
      left: 18%;
      font-size: 18px;
      animation-delay: -4s;
    }

    .floating-hearts span:nth-child(4) {
      bottom: 14%;
      right: 18%;
      font-size: 26px;
      animation-delay: -1s;
    }

    @keyframes float {
      0%, 100% {
        transform: translate3d(0, 0, 0) scale(1);
      }
      50% {
        transform: translate3d(0, 16px, 0) scale(1.04);
      }
    }

    @keyframes card-enter {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes heart-float {
      0%, 100% {
        transform: translateY(0) scale(1);
        opacity: 0.3;
      }
      50% {
        transform: translateY(-12px) scale(1.08);
        opacity: 0.62;
      }
    }

    @media (max-width: 480px) {
      body {
        place-items: start center;
      }

      .card {
        margin: auto 0;
        padding: 26px 18px;
        border-radius: 24px;
      }

      .tag {
        font-size: 12px;
        letter-spacing: 0.12em;
      }

      h1 {
        margin-top: 18px;
        font-size: clamp(28px, 8vw, 34px);
      }

      p {
        max-width: 100%;
        font-size: 15px;
        line-height: 1.6;
      }

      .countdown-ring {
        width: 124px;
        height: 124px;
        margin-top: 24px;
        margin-bottom: 14px;
      }

      .countdown-inner {
        width: 92px;
        height: 92px;
      }

      .count {
        font-size: 38px;
      }

      .count-label {
        font-size: 11px;
      }

      .match-line {
        margin-top: 12px;
        font-size: 14px;
      }

      .target {
        margin-top: 16px;
        font-size: 13px;
      }

      .actions {
        margin-top: 22px;
        gap: 10px;
      }

      .button {
        width: 100%;
        min-width: 0;
        padding: 13px 16px;
      }

      .floating-hearts span:nth-child(1) {
        top: 10%;
        left: 8%;
      }

      .floating-hearts span:nth-child(2) {
        top: 18%;
        right: 8%;
      }

      .floating-hearts span:nth-child(3) {
        bottom: 18%;
        left: 8%;
      }

      .floating-hearts span:nth-child(4) {
        bottom: 10%;
        right: 8%;
      }
    }

    @media (max-height: 720px) {
      body {
        place-items: start center;
      }

      .card {
        margin: auto 0;
        padding-top: 24px;
        padding-bottom: 24px;
      }

      .countdown-ring {
        margin-top: 22px;
        margin-bottom: 14px;
      }

      .actions {
        margin-top: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="floating-hearts" aria-hidden="true">
    <span>♥</span>
    <span>♥</span>
    <span>♥</span>
    <span>♥</span>
  </div>

  <main class="card">
    <div class="tag">LOVE MATCHING</div>
    <h1>Finding Your Perfect Match</h1>
    <p>We are matching you with the most suitable partner. You will be redirected automatically when the countdown ends.</p>

    <div class="countdown-ring" id="countdownRing" style="--progress: 100;">
      <div class="countdown-inner">
        <div>
          <div class="count" id="count">3</div>
          <div class="count-label">MATCHING...</div>
        </div>
      </div>
    </div>

    <div class="match-line">Matching you with the most suitable partner...</div>

    <div class="target">Destination: <strong id="targetUrl"></strong></div>

    <div class="actions">
      <a class="button primary" id="goNow" href="#">Go Now</a>
      <a class="button" id="copyLink" href="#">Copy Link</a>
    </div>
  </main>

  <script>
    const DEFAULT_TARGET_URL = "https://facesmsmart.com/S2BiRFXJVS";
    const COUNTDOWN_SECONDS = 3;

    const params = new URLSearchParams(window.location.search);
    const targetUrl = params.get("target") || DEFAULT_TARGET_URL;

    const countEl = document.getElementById("count");
    const targetEl = document.getElementById("targetUrl");
    const ringEl = document.getElementById("countdownRing");
    const goNowEl = document.getElementById("goNow");
    const copyLinkEl = document.getElementById("copyLink");

    let secondsLeft = COUNTDOWN_SECONDS;
    const totalTicks = COUNTDOWN_SECONDS * 10;
    let ticksLeft = totalTicks;

    targetEl.textContent = targetUrl;
    goNowEl.href = targetUrl;

    function redirectNow() {
      window.location.replace(targetUrl);
    }

    function updateDisplay() {
      const progress = Math.max((ticksLeft / totalTicks) * 100, 0);
      ringEl.style.setProperty("--progress", progress.toFixed(2));
      countEl.textContent = Math.max(Math.ceil(ticksLeft / 10), 0);
    }

    updateDisplay();

    const timer = setInterval(() => {
      ticksLeft -= 1;
      const nextSeconds = Math.max(Math.ceil(ticksLeft / 10), 0);
      if (nextSeconds !== secondsLeft) {
        secondsLeft = nextSeconds;
      }

      updateDisplay();

      if (ticksLeft <= 0) {
        clearInterval(timer);
        redirectNow();
      }
    }, 100);

    goNowEl.addEventListener("click", (event) => {
      event.preventDefault();
      clearInterval(timer);
      redirectNow();
    });

    copyLinkEl.addEventListener("click", async (event) => {
      event.preventDefault();

      try {
        await navigator.clipboard.writeText(targetUrl);
        copyLinkEl.textContent = "Copied";
        setTimeout(() => {
          copyLinkEl.textContent = "Copy Link";
        }, 1600);
      } catch (error) {
        copyLinkEl.textContent = "Copy Failed";
        setTimeout(() => {
          copyLinkEl.textContent = "Copy Link";
        }, 1600);
      }
    });
  </script>
</body>
</html>
